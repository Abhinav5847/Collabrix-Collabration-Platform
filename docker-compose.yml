version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - ./server/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_server
    restart: always

  backend:
    build: ./server
    container_name: django_backend
    volumes:
      - ./server:/app
      - media_data:/app/media  
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis]

  # --- FIXED: Local DynamoDB Instance ---
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb_local
    user: root  # Fixes "unable to open database file" error
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    restart: always

  ai_service:
    build: ./ai_service
    container_name: collabrix_ai
    ports:
      - "8001:8001"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DYNAMODB_URL=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - qdrant
      - dynamodb-local

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  gateway:
    image: nginx:latest
    container_name: common_gateway
    ports:
      - "80:80"  
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_started
      ai_service:
        condition: service_started
    restart: always

  celery_worker:
    build: ./server
    container_name: collabrix_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - ./server:/app
      - media_data:/app/media 
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis, backend]

  celery_beat:
    build: ./server
    container_name: collabrix_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis, backend]

volumes:
  postgres_data:
  media_data:
  qdrant_storage:
  dynamodb_data: