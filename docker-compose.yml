version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    env_file: ./server/.env
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_server
    restart: always

  backend:
    build: ./server
    container_name: django_backend
    volumes:
      - ./server:/app
      - media_data:/app/media  
    env_file: ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis]

  ai_service:
    build: ./ai_service
    container_name: fastapi_ai
    volumes:
      - ./ai_service:/app
    restart: on-failure

  gateway:
    image: nginx:latest
    container_name: common_gateway
    ports:
      - "80:80"  
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_started
      ai_service:
        condition: service_started
    restart: always

  celery_worker:
    build: ./server
    container_name: collabrix_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - ./server:/app
      - media_data:/app/media 
    env_file: ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis, backend]

  celery_beat:
    build: ./server
    container_name: collabrix_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - ./server:/app
    env_file: ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis, backend]

volumes:
  postgres_data:
  media_data:





