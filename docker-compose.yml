version: '3.8'

services:
  # Infrastructure
  db:
    image: postgres:15
    container_name: postgres_db
    env_file: ./server/.env
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_server
    restart: always

  # SERVICE 1: Django Web App
  backend:
    build: ./server
    container_name: django_backend
    volumes:
      - ./server:/app
    env_file: ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis]

  # SERVICE 2: FastAPI AI Service
  ai_service:
    build: ./ai_service
    container_name: fastapi_ai
    volumes:
      - ./ai_service:/app
    restart: on-failure

  # THE ENTRY POINT (Gateway)
  gateway:
    image: nginx:latest
    container_name: common_gateway
    ports:
      - "80:80"  # Access via http://localhost/
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [backend, ai_service]
    restart: always

  # Background Worker (Linked to Service 1)
  celery_worker:
    build: ./server
    container_name: collabrix_worker
    command: celery -A config worker --loglevel=info
    env_file: ./server/.env
    depends_on: [db, redis, backend]

volumes:
  postgres_data:




