version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
 
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./server
    container_name: django_backend
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
    depends_on:
      - db
    restart: on-failure

volumes:
  postgres_data: