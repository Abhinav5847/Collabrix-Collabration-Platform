services:
  db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - ./server/.env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis_server
    # ports:
    #   - "6379:6379"
    expose:
      - "6379"
    restart: always

  backend:
    build: ./server
    container_name: django_backend
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"

    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    restart: on-failure

  celery_worker:
    build: ./server
    container_name: collabrix_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
      - backend
    restart: on-failure

  celery_beat:
    build: ./server
    container_name: collabrix_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
      - backend
    restart: on-failure    

volumes:
  postgres_data:


