version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - ./server/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_server
    restart: always

  backend:
    build: ./server
    container_name: django_backend
    volumes:
      - ./server:/app
      - media_data:/app/media  
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis]

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb_local
    user: root  
    ports:
      - "9005:8000" # Moved from 9000 to 9005 to ensure a clean slot
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    restart: always

  ai_service:
    build: ./ai_service
    container_name: collabrix_ai
    ports:
      - "9001:8001"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333 # Internal container port remains 6333
      # - DYNAMODB_URL=http://dynamodb-local:8000
      # - AWS_REGION=us-east-1
      - AWS_REGION=ap-south-1
      # - AWS_ACCESS_KEY_ID=local
      # - AWS_SECRET_ACCESS_KEY=local
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - qdrant
      # - dynamodb-local

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "7333:6333" # Moved host port to 7333 (Safe Range)
      - "7334:6334" # Moved host port to 7334
    volumes:
      - qdrant_storage:/qdrant/storage

  gateway:
    image: nginx:latest
    container_name: common_gateway
    ports:
      - "4000:80"  
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      ai_service:
        condition: service_started
    restart: always

  celery_worker:
    build: ./server
    container_name: collabrix_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - ./server:/app
      - media_data:/app/media 
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis, backend]

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_automation
    ports:
      - "5680:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

  celery_beat:
    build: ./server
    container_name: collabrix_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on: [db, redis, backend]   

volumes:
  postgres_data:
  media_data:
  qdrant_storage:
  dynamodb_data:
  n8n_data: