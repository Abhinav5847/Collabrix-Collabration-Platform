<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ document.title }}</title>
    <style>
        @page {
            size: A4;
            margin: 2.5cm;
            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size: 9pt;
                color: #8c8c8c;
            }
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            font-size: 11pt;
        }
        .header {
            border-bottom: 2px solid #e8e6e0;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 26pt;
            margin: 0 0 10px 0;
            color: #111111;
            font-weight: 600;
        }
        .meta {
            font-size: 9pt;
            color: #6e6a63;
        }
        .content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ document.title|default:"Untitled Document" }}</h1>
        <div class="meta">
            <strong>Exported:</strong> {% now "F j, Y, g:i a" %}
        </div>
    </div>
    
    <div class="content">
        {{ document.content }}
    </div>
</body>
</html>
