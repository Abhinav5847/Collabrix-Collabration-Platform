# Map for WebSocket connection upgrades
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name 127.0.0.1 localhost;

    resolver 127.0.0.11 valid=30s;

    # 1. AI SERVICE (FastAPI)
    location /ai/ {
        proxy_pass http://ai_service:8001/; 
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # FIXED: Pass Cookies to the AI service
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # 2. WEBSOCKETS (Django Channels)
    location /ws/ {
        # FIXED: Using 'backend' to match your docker-compose service name
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie; # Passes your auth cookie
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # 3. BACKEND API & ADMIN (Django)
    # Catch any URLs starting with /api or /admin
    location ~ ^/(api|admin) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # 4. FRONTEND (Vite on your Host Machine)
    location / {
        # This points to your React app running on port 3000 locally
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Host $http_host; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}